services:
  postgres:
    image: postgres:16
    container_name: inventario_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: inventario
      POSTGRES_USER: inventario_user
      POSTGRES_PASSWORD: inventario_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
